version: 0.2

# CodeBuild buildspec for deploying the Astro site to S3 + CloudFront.
# Required environment variables (configure in CodeBuild project):
# - BUCKET: S3 bucket name for hosting (e.g., subaru-is-running-site)
# - DISTRIBUTION_ID: CloudFront distribution ID (e.g., E123ABC456DEF)
# - PUBLIC_DRAW_API_BASE: Draw API Gateway base URL
# Optional environment variables:
# - APP_DIR: path to app within the repo (default: astro-blog)

env:
  variables:
    APP_DIR: "astro-blog"
    SITE_URL: "https://subaru-is-running.com"

cache:
  paths:
    - '/root/.npm/**/*'

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Current Node=$(node -v) NPM=$(npm -v)
      - export NODE_ENV=development
      - |
        start=$(date +%s)
        echo Installing Astro dependencies with dev deps
        npm ci --prefix "$APP_DIR"
        end=$(date +%s)
        echo "[timing] npm ci $APP_DIR: $((end - start))s"
      - |
        start=$(date +%s)
        echo Installing admin-app dependencies for summary generation
        npm ci --prefix admin-app
        end=$(date +%s)
        echo "[timing] npm ci admin-app: $((end - start))s"
  pre_build:
    commands:
      - |
        if [ -z "$PUBLIC_PDF_API_BASE" ]; then
          echo "ERROR: PUBLIC_PDF_API_BASE is required (set in CodeBuild Environment variables)" >&2
          exit 1
        fi
      - |
        if [ -z "$PUBLIC_DRAW_API_BASE" ]; then
          echo "ERROR: PUBLIC_DRAW_API_BASE is required (set in CodeBuild Environment variables)" >&2
          exit 1
        fi
      - echo "Using PUBLIC_PDF_API_BASE=$PUBLIC_PDF_API_BASE"
      - echo "PUBLIC_DRAW_API_BASE is configured"
      - |
        start=$(date +%s)
        echo "Generating monthly summaries in $APP_DIR - stable slugs"
        npm run gen:summary --prefix "$APP_DIR" -- --force
        end=$(date +%s)
        echo "[timing] monthly summaries: $((end - start))s"
  build:
    commands:
      - echo Building in $APP_DIR
      - |
        start=$(date +%s)
        npm run build --prefix "$APP_DIR"
        end=$(date +%s)
        echo "[timing] Astro build: $((end - start))s"
      - |
        start=$(date +%s)
        echo Running sanity tests
        node "$APP_DIR/scripts/sanity-check.mjs" "$APP_DIR/dist"
        end=$(date +%s)
        echo "[timing] sanity check: $((end - start))s"
  post_build:
    commands:
      - |
        if [ -d "$APP_DIR/dist" ]; then
          start=$(date +%s)
          echo Uploading versioned Astro assets before HTML
          aws s3 sync "$APP_DIR/dist/_astro" "s3://$BUCKET/_astro" --size-only --only-show-errors --no-progress
          echo Syncing HTML and public files without deleting versioned Astro assets
          aws s3 sync "$APP_DIR/dist" "s3://$BUCKET" --delete --exclude '_astro/*' --only-show-errors --no-progress
          end=$(date +%s)
          echo "[timing] S3 sync: $((end - start))s"

          start=$(date +%s)
          echo Invalidating CloudFront distribution $DISTRIBUTION_ID
          INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths '/*' --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed --distribution-id "$DISTRIBUTION_ID" --id "$INVALIDATION_ID"
          end=$(date +%s)
          echo "[timing] CloudFront invalidation completed: $((end - start))s"

          expected_draw_asset=$(grep -o 'component-url="/_astro/DrawResult\.[^"]*\.js"' "$APP_DIR/dist/draw/result/index.html" | head -n 1 | cut -d '"' -f 2)
          live_result_html=$(curl --fail --silent --show-error "$SITE_URL/draw/result/?deploy=$CODEBUILD_BUILD_NUMBER")
          echo "$live_result_html" | grep -F "component-url=\"$expected_draw_asset\"" >/dev/null
          curl --fail --silent --show-error --output /dev/null "$SITE_URL$expected_draw_asset"
          echo "Production draw result references live asset $expected_draw_asset"
        else
          echo "No build output found at $APP_DIR/dist. Skipping deploy."
        fi

# Optional: also publish the built site as a pipeline artifact.
artifacts:
  base-directory: astro-blog/dist
  files:
    - '**/*'
