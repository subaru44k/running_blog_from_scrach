repo:
  components:
    astro_blog:
      paths:
        - astro-blog/src/pages
        - astro-blog/src/layouts/Layout.astro
        - astro-blog/src/content
        - astro-blog/public
      integrations:
        - tailwind
        - react
      build:
        buildspec: astro-blog/buildspec.yml
        output_dir: astro-blog/dist
        codebuild:
          runtime: Node.js 20 via buildspec runtime-versions
          cache_paths:
            - /root/.npm/**/*
          deploy:
            target: S3 + CloudFront
            sync_strategy:
              - upload dist/_astro before HTML and retain older hashed assets
              - sync remaining files with --delete while excluding _astro/* and compare content/mtime rather than size only
            invalidation: create /* invalidation and wait until it completes
            smoke_check: production draw result HTML must reference the current build asset and that asset must return HTTP 200
            timing_logs:
              - npm ci astro-blog
              - npm ci admin-app
              - monthly summaries
              - Astro build
              - sanity check
              - asset-first S3 sync
              - CloudFront invalidation completion
        generated_monthly_summaries:
          script: admin-app/scripts/generate-monthly-summary.js
          filename_pattern: "{YYYY-MM}-summary.md"
          behavior:
            - stable summary slugs avoid random monthly summary URLs on each deploy
            - force mode deletes legacy "{YYYY-MM}-summary-*.md" files
            - existing stable summary files are rewritten only when content changes
        blog_index:
          module: astro-blog/src/lib/blog-index.ts
          responsibility:
            - cache getCollection results per build process
            - expose sorted and unsorted published blog post lists
            - preserve existing route output ordering for blog lists, sitemap, category maps, and calendar maps
        output_parity_check:
          baseline_dir: astro-blog/.dist-baseline
          command: npm run compare:dist --prefix astro-blog
        quick_check:
          command: npm run build:quick --prefix astro-blog
          env:
            ASTRO_BUILD_NO_POSTS: "1"
      deploy_targets:
        - CloudFront distribution EMED5317DC581
        - S3 bucket 20250805-subaru-running-blog-site
      url_routes:
        canonical:
          - /
          - /blog/
          - /archive/
          - /draw/
          - /draw/archive/
          - /draw/play/
          - /draw/result/
          - /games/
          - /games/balloon-catch/
          - /games/dressup/
          - /games/dressup-next/
          - /games/match-quiz/
          - /games/janken/
          - /games/clock/
          - /games/snake/
          - /games/maze/
          - /games/tic-tac-toe/
          - /games/reversi/
          - /running-pace/
          - /pdf-compress/
          - /contact/
          - /privacy/
          - /about/
        generated:
          - /ads.txt
          - /sitemap.xml
          - /category-map.json
          - /cal-map.json
          - /cal-map/{year}/{month}.json
        experimental_noindex: []
    admin_app:
      purpose: "管理UIとスクリプトによるブログ編集/生成"
      entry: admin-app/server.js
      scripts:
        - admin-app/scripts/import-fitbit-workouts.js
        - admin-app/scripts/generate-monthly-summary.js
    lambdas:
      fitbit_callback:
        path: lambdas/fitbit-callback
        handler: index.mjs
        infra: cloudformation.yaml
      sign_upload_v3:
        path: lambdas/sign-upload-v3
        handler: index.mjs
    pdf_compress_service:
      path: pdf-compress-service
      docker:
        dockerfile: pdf-compress-service/Dockerfile
      lambda_entry: pdf-compress-service/lambda.js
    draw_backend:
      path: backend/draw
      handlers:
        - backend/draw/src/handlers/prompt.ts
        - backend/draw/src/handlers/uploadUrl.ts
        - backend/draw/src/handlers/submit.ts
        - backend/draw/src/handlers/leaderboard.ts
        - backend/draw/src/handlers/submission.ts
        - backend/draw/src/handlers/monthlyCleanup.ts

site:
  language: ja
  primary_content:
    - PDF compression tool
    - running pace calculator
    - 30-second drawing scoring game
    - mini games
    - running logs and race reports
  presentation:
    home_page:
      role: visual hub for primary content
      generated_assets:
        - astro-blog/public/images/site/home-hero.webp
        - astro-blog/public/images/site/tools-visual.webp
        - astro-blog/public/images/site/games-visual.webp
      notes:
        - generated images are decorative/supporting visuals only; all meaningful labels and calls to action remain HTML text
        - top page keeps direct routes to tools, games, and blog content visible before lower supporting links
  routing:
    canonical_routes:
      - /
      - /blog/
      - /archive/
      - /draw/
      - /draw/archive/
      - /draw/play/
      - /draw/result/
      - /games/
      - /games/balloon-catch/
      - /games/dressup/
      - /games/dressup-next/
      - /games/match-quiz/
      - /games/janken/
      - /games/clock/
      - /games/snake/
      - /games/maze/
      - /games/tic-tac-toe/
      - /games/reversi/
      - /running-pace/
      - /pdf-compress/
      - /contact/
      - /privacy/
      - /about/
    section_anchors:
      /running-pace/:
        - "#calculator"
        - "#table"
    experimental_noindex_routes: []
    not_found_policy:
      status: 404
      body: /404.html
      seo:
        canonical: disabled
        robots: noindex,follow
  seo:
    adsense:
      client: ca-pub-7941378059940304
      verification:
        head_meta:
          name: google-adsense-account
          content: ca-pub-7941378059940304
        script:
          src: "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7941378059940304"
      content_presentation:
        - top page links to the drawing game and mini games as primary site content
        - about page explains tools, games, and running logs consistently with the live navigation
        - draw and match-quiz pages include explanatory publisher content beyond the interactive UI
        - contact page lists accepted inquiry types while using X as the only public contact channel
      privacy_required_content:
        - disclose Google and third-party ad cookies
        - disclose personalized ads based on visits to this and other sites
        - link to Google Ads Settings and aboutads.info choices
        - describe drawing game image/ranking data use
      ads_txt:
        route: /ads.txt
        source: astro-blog/public/ads.txt
        content: "google.com, pub-7941378059940304, DIRECT, f08c47fec0942fa0"
    article_noindex_categories:
      - 練習(弱)
      - 練習(中)
      - 練習(デフォルト)
    article_noindex_slug_contains:
      - -summary-
      - -summary
    sitemap_excludes_article_categories:
      - 練習(弱)
      - 練習(中)
      - 練習(デフォルト)
    sitemap_excludes_article_slug_contains:
      - -summary-
      - -summary

features:
  pdf_compress:
    steps:
      - sign-upload: create presigned POST (url + fields)
      - upload: POST PDF to S3 uploads/
      - compress: call /compress level=1/2/3 (parallel)
      - outputs: store outputs/*.pdf
      - previews: store previews/*.png (best-effort)
    upload_max_mb: 50
    url_ttl_seconds:
      download_preview: 600
      upload: 600
    aws_resources:
      api_gateway: pdf-compress-api (6zzbxx14u6)
      uploads_bucket: pdf-compress-uploads-prod
      compress_lambda: pdf-compress-lambda
      sign_upload_lambda: pdf-sign-upload
      cleanup_lambda: pdf-compress-cleanup-s3-prod
    security_notes:
      - temp files are stored for a limited time (S3 lifecycle assumed)
      - keepSource=true avoids race deletion during parallel processing
  fitbit:
    oauth:
      callback_lambda: fitbit-callback
      token_storage: S3 token.json
    draft_generation:
      script: admin-app/scripts/import-fitbit-workouts.js
    storage: TODO
  draw_backend:
    routes:
      - /draw/
      - /draw/play/
      - /draw/result/
    behavior:
      - API Gateway + Lambda backend for prompt/upload-url/submit/leaderboard/submission
      - GET /api/draw/prompt provides server-authoritative monthly prompt
      - frontend uses PUBLIC_DRAW_API_BASE to call /api/draw/*
      - frontend API requests use finite timeouts and expose retryable errors instead of indefinite loading states
      - draw result renders a saved score independently from prompt and leaderboard availability
      - Lambda handlers are bundled as CommonJS (.cjs) for Node 20 runtime compatibility
      - "`npm run build --prefix backend/draw` rebuilds both `dist/*.cjs` and deployable `artifacts/*.zip`"
      - prompt switches monthly (JST) with fixed sequence; 2026-02 is index 0 (熊)
      - image upload via S3 signed PUT
      - CloudFront signed URL for image viewing (900s)
      - primary review displays score, a fuller 4-sentence review comment assembled server-side from summary/goodPoint/improvement/nextStep fields, tips, and derived breakdown without secondary follow-up
      - share card generated in browser
      - submit/upload APIs resolve promptId and promptText server-side from month rules
      - primary scoring uses OpenAI GPT-5 mini with reasoning.effort=minimal (fallback to stub)
      - primary scoring asks AI for a 6-axis rubric (0-10 each) with stricter anchored meanings (0-2 invalid, 3-4 weak, 5-6 normally understandable, 7 clearly above normal, 8 rare, 9 very strong, 10 exceptional)
      - primary score is computed server-side from a weighted average of rubric values plus a light structural bonus, clamped into 20-100
      - weighted score uses promptMatch*0.30, shapeClarity*0.22, completeness*0.16, composition*0.14, creativity*0.10, lineStability*0.08
      - light score bonus adds only small lifts when promptMatch, shapeClarity, completeness, and lineStability are all reasonably strong, and a small penalty when promptMatch is very low
      - legacy breakdown (likeness/composition/originality) is derived from rubric for frontend compatibility
      - OpenAI token usage and estimated USD cost are stored per submission (input/output/total/model/provider/latency)
      - draw routes are included in sitemap and linked from global nav
      - /draw/archive/ provides monthly Top20 history from 2026-02 onward (client fetches month-by-month leaderboard)
      - /draw/archive/ ranking cards open a client-side detail modal that fetches submission detail on demand from GET /api/draw/submission
      - draw backend resources use cost allocation tags (Service=draw, Env=prod)
      - monthly cleanup keeps only previous month's Top20 images and deletes others from S3
      - draw submissions remain in DynamoDB long enough for monthly final ranking, and monthly cleanup extends Top20 rows to long-term retention for archive pages
  mini_games:
    routes:
      - /games/
      - /games/balloon-catch/
      - /games/dressup/
      - /games/dressup-next/
      - /games/match-quiz/
      - /games/janken/
      - /games/clock/
      - /games/snake/
      - /games/maze/
      - /games/tic-tac-toe/
      - /games/reversi/
    behavior:
      - /games/ is the hub page for lightweight browser games
      - global nav links separately to /draw/ and /games/ to keep draw as a first-class feature
      - /games/ includes the draw game as the featured card and links to ten lighter mini-games
      - balloon-catch, snake, maze, tic-tac-toe, reversi, janken, clock, dressup, dressup-next, and match-quiz are shipped as static Astro pages with client-side logic and no backend dependency
      - individual mini-game pages render their related-game sidebar from a shared component so public game links, including /games/dressup-next/ and /draw/, stay consistent across pages; the current page remains visible as a non-link item
      - /games/balloon-catch/ is a 30-second balloon catching game where the player moves a dog horizontally to catch balloons thrown by a CPU character, offers おそい/ふつう/はやい difficulty settings, uses only pre-generated game assets, draws the dog from the selected sprite sheet rather than separate dog pose images, and provides a wide play mode that uses the Fullscreen API when available with a CSS overlay fallback
      - /games/match-quiz/ is a local-first image-to-text multiple-choice quiz that starts from seeded sample sets, keeps quiz-start as the primary in-page CTA, stores cards in browser storage through a repository layer, and keeps quiz generation separate from the UI for future media/login/sync expansion
      - /games/match-quiz/ seeds read-only sample sets and lets users create or delete custom local sets; only custom sets can add or delete cards
      - /games/dressup/ is a theme-based outfit duel where the player dresses a mannequin by tapping body regions, each slot also offers a `なし` option, Chat-san chooses outfit parts in fixed order with about two seconds of visible thinking per part, and the round ends by asking which coordinate is preferred rather than auto-scoring
      - /games/dressup-next/ is a public PNG-layer dress-up game that keeps /games/dressup/ unchanged, offers about twenty image-preview choices per clothing/accessory slot with in-slot previous/next pagination, hides editing hotspots after completion, lets Chat-san visibly choose parts in fixed order, and is included in sitemap.xml and the games service worker caches
      - /games/janken/ provides Chat-san mode and local 1v1 mode, uses one-round matches, waits briefly before Chat-san reveals a hand, and uses sequential hidden input for local two-player play
      - /games/clock/ asks the player to match a target time by dragging the analog clock hands directly, carries the hour forward or backward when the minute hand crosses 12, offers やさしい/ふつう/むずかしい difficulty levels (whole hours / half hours / 5-minute steps), and checks correctness only when the player presses the answer button
      - /games/snake/ offers three speed modes (おそい / ふつう / はやい), defaults to ふつう on each visit, and applies the selected speed when the player presses start/restart
      - /games/balloon-catch/, /games/maze/, and /games/snake/ accept Gamepad API input in addition to keyboard and touch controls, with Android Chrome as the primary target environment
      - /games/balloon-catch/, /games/maze/, and /games/snake/ treat directional input as game-priority while the page is open, preventing page scroll and browser focus navigation from arrow-key-like controller input
      - gamepad support maps D-pad and left stick to movement, uses a primary button for restart/start, and a secondary button for pause in snake
      - reversi provides AI play and local two-player mode, with localStorage used only for settings persistence
      - a dedicated Service Worker quietly enables offline use for /games/ and /games/* after those routes are visited once online
      - offline caching is limited to the mini-game hub, individual mini-game pages, and their same-origin static assets
  blog:
    indexing_policy:
      - category 練習(弱) article pages are noindex,follow
      - category 練習(中) article pages are noindex,follow
      - category 練習(デフォルト) article pages are noindex,follow
      - monthly summary article pages (`*-summary-*` and `*-summary`) are noindex,follow
      - those categories are excluded from sitemap.xml
      - summary article pages are excluded from sitemap.xml
      - blog and archive listing pages continue to link to those articles for human navigation
      - /archive/ lists published articles by year/month, shows each article category, and supports client-side category filtering via the category query parameter
      - sidebar category navigation keeps /category-map.json limited to recent items per category and links to /archive/?category=... for older category history

assumptions:
  - CloudFront distribution/resource IDs are documented in docs/aws-resources.md
  - S3 lifecycle and cleanup policies for uploads/outputs/previews are documented in docs/ops-parameters.md
  - API Gateway IDs and public endpoints for pdf-compress and draw are documented in docs/aws-resources.md
  - TODO: Exact production domains for admin-app (if any)
  - TODO: OAuth app scopes and admin-app env var templates
